<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Répertoire de Fossile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wood: #2b241f;
    --wood-deep: #221c18;
    --paper: #f2ead9;
    --paper-dim: #e8ddc4;
    --ink: #26201a;
    --ink-soft: #5a4f42;
    --brass: #b08d57;
    --brass-bright: #cda86b;
    --rust: #8a4a2f;
    --stratum: #6b7368;
    --radius: 3px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--wood);
    background-image:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.03), transparent 60%),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 120px);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a{ color: inherit; }

  /* ---------- Header / Hero ---------- */
  header.hero{
    padding: 5rem 1.5rem 4rem;
    text-align: center;
    border-bottom: 1px solid rgba(176,141,87,0.25);
  }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--brass-bright);
    margin-bottom: 1rem;
  }

  h1.title{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    line-height: 1.05;
    margin: 0 0 0.8rem;
    color: var(--paper);
  }
  h1.title em{
    font-style: italic;
    font-weight: 500;
    color: var(--brass-bright);
  }

  .subtitle{
    max-width: 40ch;
    margin: 0 auto;
    color: rgba(242,234,217,0.65);
    font-size: 0.98rem;
    line-height: 1.5;
  }

  .stats-row{
    display:flex;
    gap: 2.5rem;
    justify-content:center;
    margin-top: 2.5rem;
    flex-wrap: wrap;
  }
  .stat{
    font-family:'IBM Plex Mono', monospace;
  }
  .stat .n{
    display:block;
    font-size: 1.6rem;
    color: var(--brass-bright);
  }
  .stat .l{
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(242,234,217,0.5);
  }

  /* ---------- Controls ---------- */
  .controls{
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 1rem;
    display:flex;
    gap: 0.9rem;
    align-items:flex-start;
    flex-wrap: wrap;
    justify-content: space-between;
  }

  .tabs-wrap{
    display:flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .tabs{
    display:flex;
    gap: 0.4rem;
    background: rgba(0,0,0,0.2);
    padding: 0.3rem;
    border-radius: 999px;
    border: 1px solid rgba(176,141,87,0.2);
    width: fit-content;
  }

  .tabs-sub{
    background: transparent;
    border-color: rgba(176,141,87,0.12);
    padding-left: 0.6rem;
  }
  .tabs-sub .tab{
    font-size: 0.68rem;
    padding: 0.4rem 0.85rem;
    color: rgba(242,234,217,0.45);
  }
  .tabs-sub .tab.active{
    background: rgba(176,141,87,0.18);
    color: var(--brass-bright);
  }
  .tabs-sub .tab:hover{ color: var(--paper); }
  .tab{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    background: transparent;
    border: none;
    color: rgba(242,234,217,0.6);
    padding: 0.5rem 1rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .tab:hover{ color: var(--paper); }
  .tab.active{
    background: var(--brass);
    color: var(--wood-deep);
    font-weight: 500;
  }

  .search{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(176,141,87,0.25);
    color: var(--paper);
    padding: 0.6rem 1rem;
    border-radius: 999px;
    min-width: 220px;
    outline: none;
  }
  .search::placeholder{ color: rgba(242,234,217,0.35); }
  .search:focus{ border-color: var(--brass); }

  /* ---------- Gallery ---------- */
  .gallery{
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 6rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.6rem;
  }

  .empty-state{
    grid-column: 1/-1;
    text-align:center;
    padding: 4rem 1rem;
    color: rgba(242,234,217,0.4);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
  }

  .card{
    position: relative;
    background: var(--paper);
    color: var(--ink);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transform: rotate(var(--tilt, 0deg));
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
  }
  .card:nth-child(3n+1){ --tilt: -0.6deg; }
  .card:nth-child(3n+2){ --tilt: 0.4deg; }
  .card:nth-child(3n){ --tilt: -0.3deg; }

  .card:hover{
    transform: rotate(0deg) translateY(-4px);
    box-shadow: 0 14px 30px rgba(0,0,0,0.45);
  }

  .pin{
    position:absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--brass-bright), var(--rust) 75%);
    box-shadow: 0 2px 3px rgba(0,0,0,0.5);
    z-index: 2;
  }

  .card-image{
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--paper-dim) center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom: 1px dashed rgba(38,32,26,0.25);
  }
  .card-image.placeholder{
    color: rgba(38,32,26,0.3);
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    text-align:center;
    padding: 1rem;
  }
  .card-image img{
    width:100%; height:100%; object-fit: cover;
  }

  .card-body{
    padding: 1rem 1.1rem 1.2rem;
  }

  .catalog-no{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--rust);
    margin-bottom: 0.35rem;
  }

  .taxon{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.15rem;
    line-height: 1.2;
    margin: 0 0 0.5rem;
  }

  .meta-line{
    font-size: 0.78rem;
    color: var(--ink-soft);
    display:flex;
    gap: 0.4rem;
    margin-bottom: 0.15rem;
  }
  .meta-line .k{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--stratum);
    min-width: 62px;
  }

  .family-tag{
    display:inline-block;
    margin-top: 0.6rem;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.25rem 0.55rem;
    border-radius: 999px;
    background: rgba(138,74,47,0.1);
    color: var(--rust);
    border: 1px solid rgba(138,74,47,0.25);
  }
  .family-tag.rhy{
    background: rgba(107,115,104,0.12);
    color: #4d5449;
    border-color: rgba(107,115,104,0.3);
  }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    display:none;
    position: fixed; inset:0;
    background: rgba(15,12,10,0.75);
    backdrop-filter: blur(3px);
    z-index: 50;
    align-items:center;
    justify-content:center;
    padding: 1.5rem;
  }
  .modal-backdrop.open{ display:flex; }

  .modal{
    background: var(--paper);
    color: var(--ink);
    max-width: 640px;
    width:100%;
    max-height: 88vh;
    overflow-y: auto;
    border-radius: var(--radius);
    position: relative;
  }
  .modal-close{
    position: absolute;
    top: 0.8rem; right: 0.8rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(38,32,26,0.08);
    color: var(--ink);
    font-size: 1.1rem;
    cursor:pointer;
    z-index: 3;
  }
  .modal-close:hover{ background: rgba(38,32,26,0.15); }

  .modal-image{
    width:100%;
    aspect-ratio: 16/10;
    background: var(--paper-dim) center/cover no-repeat;
  }
  .modal-body{ padding: 1.8rem 2rem 2.2rem; }
  .modal-body .catalog-no{ font-size: 0.75rem; }
  .modal-body .taxon{ font-size: 1.6rem; margin-bottom: 1rem; }

  .modal-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem 1.5rem;
    margin-top: 1.2rem;
    padding-top: 1.2rem;
    border-top: 1px dashed rgba(38,32,26,0.2);
  }
  .modal-grid .field .k{
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--stratum);
    display:block;
    margin-bottom: 0.2rem;
  }
  .modal-grid .field .v{ font-size: 0.9rem; }
  .modal-grid .field.full{ grid-column: 1/-1; }

  footer{
    text-align:center;
    padding: 2.5rem 1rem 3rem;
    font-family:'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: rgba(242,234,217,0.3);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  :focus-visible{
    outline: 2px solid var(--brass-bright);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<header class="hero">
  <div class="eyebrow">Collection personnelle · Animaux et plantes</div>
  <h1 class="title">Plantes &amp; Animaux <em>fossiles</em></h1>
  <p class="subtitle">Un catalogue de spécimens récoltés sur le terrain, classés par famille et étage géologique.</p>
  <div class="stats-row" id="stats-row"></div>
</header>

<div class="controls">
  <div class="tabs-wrap">
    <div class="tabs" id="tabs-kingdom">
      <button class="tab active" data-kingdom="all">Tout</button>
      <button class="tab" data-kingdom="Plantes">Plantes</button>
      <button class="tab" data-kingdom="Animaux">Animaux</button>
    </div>
    <div class="tabs tabs-sub" id="tabs-group" hidden></div>
  </div>
  <input class="search" id="search" type="text" placeholder="Rechercher un genre, un âge...">
</div>

<main class="gallery" id="gallery"></main>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-content"></div>
</div>

<footer>Cabinet de curiosités — mis à jour manuellement dans specimens.js</footer>

<script>
/* ============================================================
   TES SPÉCIMENS : modifie ce tableau pour ajouter tes fossiles.
   - image : nom de fichier dans le dossier /images (ou laisse "" 
     si tu n'as pas encore de photo, un placeholder s'affichera)
   - family : "Térébratules" ou "Rhynchonelles"
   ============================================================ */
const SPECIMENS = [
  {
    id: "TER-001",
    kingdom: "Animaux",
    group: "Térébratules",
    genus: "Dictyothyris",
    species: "coarctata",
    author: "Parkinson, 1811",
    stage: "Bathonien",
    formation: "",
    locality: "Normandie",
    date: "2025",
    size: "14 mm",
    condition: "Complet, valves fermées",
    notes: "",
    image: "images/IDTER_001_front.jpg"
  },
  {
    id: "RHY-001",
    kingdom: "Animaux",
    group: "Rhynchonelles",
    genus: "Rhynchonella",
    species: "wisniowskii",
    author: "Sokolowski, 1887",
    stage: "Callovien",
    formation: "Calcaires à polypiers",
    locality: "Bugey (Ain)",
    date: "2026-06-05",
    size: "18 mm",
    condition: "Valve dorsale légèrement érodée",
    notes: "Plis costaux bien marqués",
    image: ""
  },
  {
    id: "PLA-001",
    kingdom: "Plantes",
    group: "Stenophyllum",
    genus: "Stenophyllum",
    species: "oblongifolium",
    author: "",
    stage: "",
    formation: "",
    locality: "",
    date: "",
    size: "",
    condition: "",
    notes: "",
    image: ""
  },
  {
    id: "PLA-002",
    kingdom: "Plantes",
    group: "Pecopteris",
    genus: "Pecopteris",
    species: "cyathea",
    author: "",
    stage: "",
    formation: "",
    locality: "",
    date: "",
    size: "",
    condition: "",
    notes: "",
    image: ""
  },
  {
    id: "PLA-003",
    kingdom: "Plantes",
    group: "Indéterminé",
    genus: "Indéterminé",
    species: "sp.",
    author: "",
    stage: "",
    formation: "",
    locality: "",
    date: "",
    size: "",
    condition: "",
    notes: "Feuille non identifiée",
    image: ""
  }
];

/* ============================================================ */

let activeKingdom = "all";
let activeGroup = "all";
let searchTerm = "";

function renderStats(){
  const total = SPECIMENS.length;
  const plantes = SPECIMENS.filter(s => s.kingdom === "Plantes").length;
  const animaux = SPECIMENS.filter(s => s.kingdom === "Animaux").length;
  document.getElementById("stats-row").innerHTML = `
    <div class="stat"><span class="n">${total}</span><span class="l">Spécimens</span></div>
    <div class="stat"><span class="n">${plantes}</span><span class="l">Plantes</span></div>
    <div class="stat"><span class="n">${animaux}</span><span class="l">Animaux</span></div>
  `;
}

function matchesSearch(s, term){
  if(!term) return true;
  const hay = `${s.genus} ${s.species} ${s.locality} ${s.stage} ${s.id} ${s.group}`.toLowerCase();
  return hay.includes(term.toLowerCase());
}

function groupsFor(kingdom){
  if(kingdom === "all") return [];
  const set = new Set(SPECIMENS.filter(s => s.kingdom === kingdom).map(s => s.group));
  return Array.from(set);
}

function familyClass(kingdom){
  return kingdom === "Plantes" ? "rhy" : "";
}

function renderSubTabs(){
  const wrap = document.getElementById("tabs-group");
  const groups = groupsFor(activeKingdom);

  if(activeKingdom === "all" || groups.length <= 1){
    wrap.hidden = true;
    wrap.innerHTML = "";
    return;
  }

  wrap.hidden = false;
  wrap.innerHTML = `
    <button class="tab ${activeGroup === 'all' ? 'active' : ''}" data-group="all">Tout — ${activeKingdom.toLowerCase()}</button>
    ${groups.map(g => `<button class="tab ${activeGroup === g ? 'active' : ''}" data-group="${g}">${g}</button>`).join("")}
  `;

  wrap.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeGroup = btn.dataset.group;
      renderSubTabs();
      render();
    });
  });
}

function cardImageHTML(s){
  if(s.image){
    return `<div class="card-image"><img src="images/${s.image}" alt="${s.genus} ${s.species}" loading="lazy"></div>`;
  }
  return `<div class="card-image placeholder">Pas encore<br>de photo</div>`;
}

function render(){
  const gallery = document.getElementById("gallery");
  const filtered = SPECIMENS.filter(s => {
    if(activeKingdom !== "all" && s.kingdom !== activeKingdom) return false;
    if(activeKingdom !== "all" && activeGroup !== "all" && s.group !== activeGroup) return false;
    return matchesSearch(s, searchTerm);
  });

  if(filtered.length === 0){
    gallery.innerHTML = `<div class="empty-state">Aucun spécimen ne correspond à cette recherche.</div>`;
    return;
  }

  gallery.innerHTML = filtered.map((s, i) => `
    <article class="card" data-index="${SPECIMENS.indexOf(s)}" tabindex="0">
      <div class="pin"></div>
      ${cardImageHTML(s)}
      <div class="card-body">
        <div class="catalog-no">${s.id}</div>
        <h3 class="taxon">${s.genus} <em>${s.species}</em></h3>
        ${s.locality ? `<div class="meta-line"><span class="k">Gisement</span>${s.locality}</div>` : ""}
        ${s.stage ? `<div class="meta-line"><span class="k">Étage</span>${s.stage}</div>` : ""}
        <span class="family-tag ${familyClass(s.kingdom)}">${s.group}</span>
      </div>
    </article>
  `).join("");

  gallery.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => openModal(SPECIMENS[card.dataset.index]));
    card.addEventListener("keydown", e => {
      if(e.key === "Enter") openModal(SPECIMENS[card.dataset.index]);
    });
  });
}

function openModal(s){
  const backdrop = document.getElementById("modal-backdrop");
  const content = document.getElementById("modal-content");
  const imageHTML = s.image
    ? `<div class="modal-image" style="background-image:url('images/${s.image}')"></div>`
    : `<div class="modal-image"></div>`;

  const fields = [
    ["Gisement", s.locality],
    ["Étage géologique", s.stage],
    ["Formation", s.formation],
    ["Taille", s.size],
    ["Date de récolte", s.date],
    ["État", s.condition],
  ].filter(([,v]) => v);

  content.innerHTML = `
    <button class="modal-close" aria-label="Fermer">×</button>
    ${imageHTML}
    <div class="modal-body">
      <div class="catalog-no">${s.id}${s.author ? " · " + s.author : ""}</div>
      <h2 class="taxon">${s.genus} <em>${s.species}</em></h2>
      <span class="family-tag ${familyClass(s.kingdom)}">${s.group}</span>
      <div class="modal-grid">
        ${fields.map(([k,v]) => `<div class="field"><span class="k">${k}</span><span class="v">${v}</span></div>`).join("")}
        <div class="field full"><span class="k">Remarques</span><span class="v">${s.notes || "—"}</span></div>
      </div>
    </div>
  `;
  content.querySelector(".modal-close").addEventListener("click", closeModal);
  backdrop.classList.add("open");
}

function closeModal(){
  document.getElementById("modal-backdrop").classList.remove("open");
}

document.getElementById("modal-backdrop").addEventListener("click", e => {
  if(e.target.id === "modal-backdrop") closeModal();
});
document.addEventListener("keydown", e => {
  if(e.key === "Escape") closeModal();
});

document.getElementById("tabs-kingdom").addEventListener("click", e => {
  if(!e.target.classList.contains("tab")) return;
  document.querySelectorAll("#tabs-kingdom .tab").forEach(t => t.classList.remove("active"));
  e.target.classList.add("active");
  activeKingdom = e.target.dataset.kingdom;
  activeGroup = "all";
  renderSubTabs();
  render();
});

document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value;
  render();
});

renderStats();
renderSubTabs();
render();
</script>

</body>
</html>
